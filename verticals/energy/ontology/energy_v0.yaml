# vero-lite ontology — energy vertical.
# Conforms to ADR-008 D2 grammar (PLAN-003 dispatch R-K1 binding).
# Five base entities per ADR-008 D1 + an explicit AlertEventLink join
# object_type per ADR-008 D4 / PLAN-003 §8.6 (many-to-many deferred).
# v1 content (PLAN-0049 Step 1): distribution-utility coverage from the
# partner-sim run-1 rehearsal (F9) — asset_type += feeder/cap_bank/gas_engine,
# a distinct current-rating property (SD-6), and current/voltage metric kinds +
# bindings. NOTE: `version` below is the ADR-008 GRAMMAR version (const 0 in the
# L1 meta-schema), NOT the content revision — the grammar is unchanged (the R2
# grammar amendment is carved out of PLAN-0049 per SD-1), so it stays 0.

version: 0
namespace: energy

object_types:
  Asset:
    primary_key: asset_id
    title_key: name
    description: A physical operational unit (battery, inverter, meter, etc.).
    properties:
      asset_id:
        type: string
        required: true
      name:
        type: string
        required: true
      asset_type:
        type: enum
        values: [battery, inverter, meter, transformer, feeder, cap_bank, gas_engine]
      capacity_kw:
        type: float
      rated_current_a:
        type: float
        description: >-
          Rated current in amperes for current-rated assets (feeders, etc.) —
          distinct from capacity_kw, which misfits assets rated in A (SD-6, F9).
      status:
        type: enum
        values: [active, maintenance, retired]
      install_date:
        type: date
      site_id:
        type: ref
        target: Site
        required: true

  Site:
    primary_key: site_id
    title_key: name
    description: A physical location hosting one or more Assets.
    properties:
      site_id:
        type: string
        required: true
      name:
        type: string
        required: true
      site_type:
        type: enum
        values: [substation, microgrid, depot]
      lat:
        type: float
      lng:
        type: float

  OperationalEvent:
    primary_key: event_id
    description: Time-stamped operational signal concerning an Asset or Site.
    properties:
      event_id:
        type: string
        required: true
      event_type:
        type: enum
        values: [reading, transition, alarm]
      severity:
        type: enum
        values: [info, warn, error, critical]
      measured_value:
        type: float
      unit:
        type: string
      measured_kind:
        type: enum
        values: [temperature, frequency, current, voltage]
      description:
        type: string
      occurred_at:
        type: timestamp
        required: true
      asset_id:
        type: ref
        target: Asset
      site_id:
        type: ref
        target: Site
    quantity_bindings:
      - kind: temperature
        unit: celsius
      - kind: frequency
        unit: hz
      - kind: current
        unit: ampere
      - kind: voltage
        unit: kilovolt

  Alert:
    primary_key: alert_id
    title_key: title
    description: An actionable notification derived from one or more OperationalEvents.
    properties:
      alert_id:
        type: string
        required: true
      title:
        type: string
        required: true
      urgency:
        type: enum
        values: [low, medium, high, critical]
      status:
        type: enum
        values: [open, acknowledged, resolved]
      opened_at:
        type: timestamp
        required: true
      resolved_at:
        type: timestamp
      reasoning:
        type: string

  RecommendedAction:
    primary_key: action_id
    description: An AI-proposed action awaiting human approval; mirrors the ADR-007 D2 runtime envelope at Phase 2.
    properties:
      action_id:
        type: string
        required: true
      action_type:
        type: enum
        values: [restart, isolate, dispatch_technician, escalate]
      confidence_score:
        type: float
      status:
        type: enum
        values: [proposed, approved, rejected, executed]
      parameters:
        type: json
      alert_id:
        type: ref
        target: Alert
        required: true
      target_asset_id:
        type: ref
        target: Asset

  AlertEventLink:
    primary_key: link_id
    description: Join object linking an Alert to the OperationalEvent(s) that triggered it (N:M via composition per ADR-008 D4).
    properties:
      link_id:
        type: string
        required: true
      created_at:
        type: timestamp
        required: true
      alert_id:
        type: ref
        target: Alert
        required: true
      event_id:
        type: ref
        target: OperationalEvent
        required: true

link_types:
  asset_hosted_at_site:
    from: Asset
    to: Site
    cardinality: many_to_one
    foreign_key: Asset.site_id -> Site.site_id
    description: Each Asset is hosted at exactly one Site.

  event_emitted_by_asset:
    from: OperationalEvent
    to: Asset
    cardinality: many_to_one
    foreign_key: OperationalEvent.asset_id -> Asset.asset_id

  event_occurred_at_site:
    from: OperationalEvent
    to: Site
    cardinality: many_to_one
    foreign_key: OperationalEvent.site_id -> Site.site_id

  action_addresses_alert:
    from: RecommendedAction
    to: Alert
    cardinality: many_to_one
    foreign_key: RecommendedAction.alert_id -> Alert.alert_id

  action_target_asset:
    from: RecommendedAction
    to: Asset
    cardinality: many_to_one
    foreign_key: RecommendedAction.target_asset_id -> Asset.asset_id

  alert_event_link_to_alert:
    from: AlertEventLink
    to: Alert
    cardinality: many_to_one
    foreign_key: AlertEventLink.alert_id -> Alert.alert_id

  alert_event_link_to_event:
    from: AlertEventLink
    to: OperationalEvent
    cardinality: many_to_one
    foreign_key: AlertEventLink.event_id -> OperationalEvent.event_id
