# vero-lite procedure spec — energy vertical, v0 (PLAN-0019 A-ζ / AC A-10).
# A routine over the energy ontology (energy_v0.yaml: Asset / Site / OperationalEvent)
# demonstrating the minimal query -> evaluate -> gated action path. A distinct spec
# layer from the ADR-008 ontology (object_types untouched). `agents` / `procedures`
# are MAPS keyed by id; the `vertical` is the dir name, not in the file.
#
# Phase-1 scope (PLAN-0019 L-1): only `trigger: manual` is RUNNABLE. The handlers
# (verticals/energy/handlers.py) are the ontology RecommendedAction.action_type
# vocabulary {restart, isolate, dispatch_technician, escalate} + `echo`, each a
# no-op receipt today (real grid-control I/O ships with the design partner). The
# over-temperature action step fixes its handler to `restart` (PLAN-0019 Part B);
# the LLM's wider proposal menu is graded separately (the α probe).
#
# Each step carries the 5-facet annotation (input · decision-condition · llm-assist ·
# output · governance) as the first-class typed `facet:` field (ADR-016 D2 Amendment
# 2026-06-25 / PLAN-0038): the net-new `decision_condition` + `llm_assist` are typed;
# `input`/`output`/`governance` are non-authoritative notes (the typed Step fields
# stay source of truth, D2-A2). The engine reads but does not consume `facet` (D2-A4).

namespace: energy
version: 0

agents:
  grid_agent:
    name: Grid Operations Agent
    llm_model: gpt-oss:20b          # ADR-001 default local model
    # ceiling = gated: the only action here is a gated restart (human go/no-go).
    autonomy_ceiling: gated
    allowed:
      step_kinds: [query, evaluate, action]
      action_handlers: [restart]    # the over-temperature action handler (no-op stub today)

procedures:
  substation_health_sweep:
    title: Substation Health Sweep
    goal: >-
      Read each active asset's latest temperature reading, judge it against the
      over-temperature threshold, and restart the assets that breach after a human
      go/no-go.
    run_by: grid_agent
    trigger: manual                 # L-1: only manual runs in Phase 1
    steps:
      - step_id: read_readings
        name: Read latest asset readings
        description: Latest temperature reading per active Asset.
        kind: query
        facet:
          decision_condition: { gate_kind: none }
          llm_assist: null
          input: "latest temperature reading per active Asset"
          output: "temperature reading per active Asset"
      - step_id: judge
        name: Judge vs over-temperature threshold
        description: >-
          Tag each asset's verdict vs the over-temperature threshold —
          breach (over the ceiling) vs ok. OCT_RECOMMEND_DIRECTION=above semantics.
        kind: evaluate
        facet:
          decision_condition: { gate_kind: env_band, band_source: env, env_var: OCT_RECOMMEND_THRESHOLD }
          llm_assist: null
          input: "read_readings set"
          output: "per-asset verdict {breach=over ceiling, ok}"
          governance: "verdict = pure function of the reading + the authored (env) band"
      - step_id: restart_breaches
        name: Restart the breaching assets
        description: >-
          Propose a restart action (ADR-007 envelope) per breaching asset; human
          approve -> execute. action_type `restart` (a no-op receipt stub until the
          real grid-control handler ships with the design partner).
        kind: action
        autonomy: gated             # the human go/no-go on an irreversible write
        handler: restart
        input:
          from: judge               # the named-input fan-out: only the breach subset
          where:
            verdict: breach
        facet:
          decision_condition: { gate_kind: none }   # handler fixed to `restart`; the LLM proposal menu is graded separately (the α probe, PLAN-0019 Part B)
          llm_assist: "propose the restart action (ADR-007 envelope, advisory; handler stays fixed)"
          input: "judge (the breach subset)"
          output: "restart action proposal per breaching asset"
          governance: "handler fixed; HUMAN go/no-go on the irreversible write (gated)"
    terminal: restart_breaches
