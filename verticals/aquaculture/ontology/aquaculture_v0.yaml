# vero-lite ontology — aquaculture vertical, v0.
# Third concrete OCT vertical + the PLAN-0016 Tier-1 Mirror-demo end-to-end
# instance (ADR-0015 D4 aquaculture pick; research 2026-06-04-vertical3-pick §4).
# Domain: shrimp / finfish pond water-quality control tower — a nighttime
# dissolved-oxygen (DO) crash breaches BELOW the safe threshold (3.2 < 4 mg/L)
# and kills a pond crop within 1-2 hours, so this is the first vertical whose
# breach is a *crash* (OCT_RECOMMEND_DIRECTION=below; PLAN-0016 Step 0).
# Conforms to the SAME ADR-008 D2 grammar as energy_v0.yaml (six object_types:
# five base entities + an explicit AlertEventLink join per ADR-008 D4). Mirrors
# the energy shape with Asset->Pond, Site->Farm.

version: 0
namespace: aquaculture

object_types:
  Pond:
    primary_key: pond_id
    title_key: name
    description: A culture pond / raceway — the managed operational unit.
    properties:
      pond_id:
        type: string
        required: true
      name:
        type: string
        required: true
      pond_type:
        type: enum
        values: [grow_out, nursery, raceway]
      area_sqm:
        type: float
      stocking_density:
        type: float
      do_floor:
        type: float
        description: >-
          Per-species dissolved-oxygen floor (mg/L) each pond's latest reading
          must stay at/above — the pond's OWN per-entity band (ADR-016 FKP
          amendment 2026-07-12); the pond breaches BELOW it.
      species:
        type: enum
        values: [whiteleg_shrimp, tiger_prawn, tilapia]
      status:
        type: enum
        values: [active, fallow, harvested]
      site_id:
        type: ref
        target: Farm
        required: true

  Farm:
    primary_key: farm_id
    title_key: name
    description: A physical farm location grouping one or more Ponds.
    properties:
      farm_id:
        type: string
        required: true
      name:
        type: string
        required: true
      farm_type:
        type: enum
        values: [coastal, inland, recirculating]
      lat:
        type: float
      lng:
        type: float

  OperationalEvent:
    primary_key: event_id
    description: Time-stamped water-quality / equipment signal concerning a Pond or Farm.
    properties:
      event_id:
        type: string
        required: true
      event_type:
        type: enum
        values: [reading, transition, alarm]
      severity:
        type: enum
        values: [info, warn, error, critical]
      measured_value:
        type: float
      unit:
        type: string
      description:
        type: string
      occurred_at:
        type: timestamp
        required: true
      pond_id:
        type: ref
        target: Pond
      site_id:
        type: ref
        target: Farm

  Alert:
    primary_key: alert_id
    title_key: title
    description: An actionable notification derived from one or more OperationalEvents.
    properties:
      alert_id:
        type: string
        required: true
      title:
        type: string
        required: true
      urgency:
        type: enum
        values: [low, medium, high, critical]
      status:
        type: enum
        values: [open, acknowledged, resolved]
      opened_at:
        type: timestamp
        required: true
      resolved_at:
        type: timestamp
      reasoning:
        type: string

  RecommendedAction:
    primary_key: action_id
    description: An AI-proposed action awaiting human approval; mirrors the ADR-007 D2 runtime envelope at Phase 2.
    properties:
      action_id:
        type: string
        required: true
      action_type:
        type: enum
        values: [start_emergency_aerator, dispatch_technician, increase_water_exchange, escalate]
      confidence_score:
        type: float
      status:
        type: enum
        values: [proposed, approved, rejected, executed]
      parameters:
        type: json
      alert_id:
        type: ref
        target: Alert
        required: true
      target_pond_id:
        type: ref
        target: Pond

  AlertEventLink:
    primary_key: link_id
    description: Join object linking an Alert to the OperationalEvent(s) that triggered it (N:M via composition per ADR-008 D4).
    properties:
      link_id:
        type: string
        required: true
      created_at:
        type: timestamp
        required: true
      alert_id:
        type: ref
        target: Alert
        required: true
      event_id:
        type: ref
        target: OperationalEvent
        required: true

link_types:
  pond_hosted_at_farm:
    from: Pond
    to: Farm
    cardinality: many_to_one
    foreign_key: Pond.site_id -> Farm.farm_id
    description: Each Pond is hosted at exactly one Farm.

  event_emitted_by_pond:
    from: OperationalEvent
    to: Pond
    cardinality: many_to_one
    foreign_key: OperationalEvent.pond_id -> Pond.pond_id

  event_occurred_at_farm:
    from: OperationalEvent
    to: Farm
    cardinality: many_to_one
    foreign_key: OperationalEvent.site_id -> Farm.farm_id

  action_addresses_alert:
    from: RecommendedAction
    to: Alert
    cardinality: many_to_one
    foreign_key: RecommendedAction.alert_id -> Alert.alert_id

  action_target_pond:
    from: RecommendedAction
    to: Pond
    cardinality: many_to_one
    foreign_key: RecommendedAction.target_pond_id -> Pond.pond_id

  alert_event_link_to_alert:
    from: AlertEventLink
    to: Alert
    cardinality: many_to_one
    foreign_key: AlertEventLink.alert_id -> Alert.alert_id

  alert_event_link_to_event:
    from: AlertEventLink
    to: OperationalEvent
    cardinality: many_to_one
    foreign_key: AlertEventLink.event_id -> OperationalEvent.event_id
