# vero-lite procedure spec â€” aquaculture vertical, v0 (PLAN-0019 A-Î¶ / AC A-10).
# The ADR-016 worked example, the "Morning Pond Health Round" headline. A distinct
# spec layer from the ADR-008 ontology (aquaculture_v0.yaml is untouched): agents +
# procedures, NOT object_types. `agents` / `procedures` are MAPS keyed by id (house
# YAML style, cf. object_types). The `vertical` is the dir name, not in the file.
#
# Phase-1 scope (PLAN-0019 L-1): only `trigger: manual` is RUNNABLE â€” the headline's
# 06:00 schedule is deferred (a PLAN-0010 scheduler reuse). The handlers
# (verticals/aquaculture/handlers.py) are the ontology RecommendedAction.action_type
# vocabulary {start_emergency_aerator, dispatch_technician, increase_water_exchange,
# escalate} + `echo`, each a no-op receipt today (real aerator I/O ships with the
# design partner). The breach action step fixes its handler to
# `start_emergency_aerator` (PLAN-0019 Part B); the no-op `summary` step keeps `echo`.
#
# PLAN-0022 Step 3 (worked example): the `judge` step authors its deterministic
# band (threshold/direction/watch_margin â€” values grounded in aquaculture_v0.yaml
# + the benchmark dataset; consumed by the engine's EvaluateStepExecutor, Phase
# 2a) and the `aerate` step declares its handler-tier taxonomy (`tiers`).
#
# PLAN-0022 Phase 2b (ADR-0019, SD-1=a): the watch set routes to a GATED
# `increase_water_exchange` proposal (`escalate_watch`) â€” the human decides on a
# concrete machine recommendation â€” replacing the pre-amendment bare visual-check
# `human_task` (ADR-016 "Morning Pond Health Round" step-4 row, amended
# 2026-06-11). "Augment" (propose AND queue a visual check) remains a
# per-procedure authoring option.
#
# Each step carries the 5-facet annotation (input Â· decision-condition Â· llm-assist Â·
# output Â· governance) as the first-class typed `facet:` field (ADR-016 D2 Amendment
# 2026-06-25 / PLAN-0038): the net-new `decision_condition` + `llm_assist` are typed;
# `input`/`output`/`governance` are non-authoritative notes (the typed Step fields
# stay source of truth, D2-A2). The `judge` facet's `in_file_band` POINTS AT the
# typed threshold/direction/watch_margin â€” it never re-stores them (D2-A3).

namespace: aquaculture
version: 0

agents:
  pond_agent:
    name: Pond Round Agent
    llm_model: gpt-oss:20b          # ADR-001 default local model
    # ceiling = auto: the summary step is an `auto` action, so the agent must be
    # permitted to act un-gated (autonomy_ceiling is the MAX any step may exercise).
    autonomy_ceiling: auto
    allowed:
      step_kinds: [query, evaluate, action, human_task]
      # `start_emergency_aerator` for the gated breach action; `echo` for the auto
      # round-summary terminal (a no-op artifact, not an operational action);
      # `increase_water_exchange` for the gated watch escalation (ADR-0019 /
      # PLAN-0022 Phase 2b â€” the precautionary handler the author allowlists).
      action_handlers: [echo, start_emergency_aerator, increase_water_exchange]

procedures:
  morning_pond_health_round:
    title: Morning Pond Health Round
    goal: >-
      Read each active pond's latest dissolved-oxygen reading, judge it against the
      4 mg/L breach threshold (DO is a crash signal â€” it breaches BELOW the floor),
      aerate the breach set after a human go/no-go, escalate the borderline watch
      set as a precautionary water-exchange proposal for technician approve/reject,
      and write a round summary over every pond.
    run_by: pond_agent
    trigger: manual                 # L-1: only manual runs in Phase 1 (06:00 deferred)
    steps:
      - step_id: read_do
        name: Read dissolved oxygen
        description: Latest reading per Pond (event_type=reading), by occurred_at.
        kind: query
        input:                          # PLAN-0062 Q4 Phase-3: the declared latest-per-group grammar
          reads: [OperationalEvent]
          where:
            event_type: reading         # load-bearing: the stalled-aerator alarm carries NO
                                        # measured_value, and an unfiltered latest-per-group
                                        # would hand the judge an unreadable row
          project:
            latest_per: event_emitted_by_pond   # FK OperationalEvent.pond_id -> Pond.pond_id
            order_by: occurred_at
        facet:
          decision_condition: { gate_kind: none }
          llm_assist: null
          # PLAN-0062: the typed reads/project above are the source of truth (D2-A2); this prose
          # is synced to it. The prior "active Pond"/"dissolved-oxygen" qualifiers are dropped â€”
          # no status-filter join was ever implemented (SD-4), and the judge grades measured_value
          # regardless of unit. Latest-per-group is what decides pond-07: its 4.6 mg/L watch
          # reading is SUPERSEDED by the 3.2 mg/L crash, so the verdict is breach, not watch.
          input: "latest OperationalEvent (event_type=reading) per Pond via event_emitted_by_pond, by occurred_at"
          output: "one latest reading row per Pond"
      - step_id: judge
        name: Judge vs threshold
        description: >-
          Tag each pond's verdict vs the 4 mg/L floor â€” breach (< 4), watch (4â€“5),
          ok (> 5). OCT_RECOMMEND_DIRECTION=below crash semantics.
        kind: evaluate
        # PLAN-0022 Step 3 (SD-5=a): the authored deterministic band the evaluate
        # executor (Phase 2a) computes per-entity verdicts from. The watch band is
        # the ADR-0019 escalate-to-human zone; all three fields are optional â€”
        # absent, the band stays NL-only and behaviour is unchanged (AC-9).
        threshold: 4.0
        direction: below
        watch_margin: 1.0
        facet:
          # in_file_band POINTS AT the typed threshold/direction/watch_margin above â€”
          # crash semantics, breach BELOW the floor â€” it does NOT re-store the values (D2-A3).
          decision_condition: { gate_kind: in_file_band, band_source: in_file }
          llm_assist: null
          input: "read_do set"
          output: "per-pond verdict {breach <4, watch 4â€“5, ok >5}"
          governance: "verdict = pure function of the reading + the authored (in-file) band; watch = the ADR-0019 escalate zone"
      - step_id: aerate
        name: Aerate the breach set
        description: >-
          Propose an emergency-aerator action (ADR-007 envelope) per breaching pond;
          human approve -> execute. action_type start_emergency_aerator (a no-op
          receipt stub until the real aerator handler ships with the design partner).
        kind: action
        autonomy: gated             # the human go/no-go on an irreversible write
        handler: start_emergency_aerator
        # PLAN-0022 Step 3 (SD-5=a): the handler-tier taxonomy, mirroring the
        # benchmark grader's canonical/acceptable tiers (one source of truth).
        # A taxonomy declaration, NOT an execution allowlist â€” what the agent may
        # invoke stays bounded by agents.pond_agent.allowed.action_handlers.
        tiers:
          canonical: start_emergency_aerator
          acceptable: [increase_water_exchange]
        input:
          from: judge               # the named-input fan-out: only the breach subset
          where:
            verdict: breach
        facet:
          decision_condition: { gate_kind: none }   # handler fixed to `start_emergency_aerator`; tiers taxonomy declared; the LLM menu is graded separately (the Î± probe)
          llm_assist: "propose the emergency-aerator action (ADR-007 envelope, advisory; handler stays fixed)"
          input: "judge (the breach subset)"
          output: "emergency-aerator proposal per breaching pond"
          governance: "handler fixed; HUMAN go/no-go on the irreversible write (gated)"
      - step_id: escalate_watch
        name: Escalate the watch set (gated proposal)
        description: >-
          Propose a precautionary water-exchange action per borderline pond
          (ADR-0019 watch->gated routing; PLAN-0022 SD-1=a â€” replaces the bare
          visual-check human_task): the LLM recommends, the run suspends at
          waiting_human, and the technician approves/rejects a CONCRETE
          recommendation instead of being told only "go look". The routing
          trigger is the judge step's deterministic verdict, never confidence
          (ADR-010 IN-3).
        kind: action
        autonomy: gated             # human decides on the ambiguous band (ADR-0019)
        handler: increase_water_exchange
        input:
          from: judge
          where:
            verdict: watch
        facet:
          decision_condition:
            gate_kind: none
            note: "watch-band routing â†’ a precautionary water-exchange proposal (ADR-0019 watchâ†’gated; trigger = the deterministic verdict, never confidence)"
          llm_assist: "recommend a concrete water-exchange action (advisory)"
          input: "judge (the watch subset)"
          output: "water-exchange proposal per borderline pond"
          governance: "HUMAN decides on the ambiguous band (gated); routing never keyed on confidence (ADR-010 IN-3)"
      - step_id: summary
        name: Round summary
        description: Auto round-summary terminal artifact over the whole verdict set.
        kind: action
        autonomy: auto
        handler: echo
        input:
          from: judge               # no `where` -> the whole verdict set
        facet:
          decision_condition: { gate_kind: none }
          llm_assist: "draft the round summary (advisory)"
          input: "judge (the whole verdict set â€” no `where`)"
          output: "round-summary artifact"
          governance: "auto terminal; a no-op `echo` artifact, not an operational action"
    terminal: summary
