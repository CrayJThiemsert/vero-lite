# vero-lite procedure spec — procurement vertical, v0 (PLAN-0036 Stage 1, Step 3).
# The ADR-016 worked example for the 4th vertical: the HERO "Emergency Sourcing
# Round" (asset failure → governed emergency sourcing) + the calm-path "Low-Stock
# Reorder Round". A distinct spec layer from the ADR-008 ontology
# (procurement_v0.yaml is untouched): agents + procedures, NOT object_types.
# `agents` / `procedures` are MAPS keyed by id (house YAML style).
#
# Phase-1 scope (L-8 / PLAN-0019 L-1): only `trigger: manual` is RUNNABLE. The
# handlers (verticals/procurement/handlers.py — Step 4) are the procurement
# RecommendedAction.action_type vocabulary {emergency_source, request_approval,
# issue_po, reorder} + `echo`, each a no-op receipt today (real ERP/email I/O
# ships with the design partner — § Out of Scope).
#
# GOVERNED ≠ GENERATED (L-3, the guardrail across every step): the LLM only
# DRAFTS/SUMMARISES (intake enrich · quote summary · justification + exec-summary ·
# audit summary). The LLM NEVER selects the supplier (source selection is a scored
# RULE), NEVER sets a threshold (the judge band is authored), and NEVER approves
# (the human gate). Each step below carries the structured 5-FACET annotation
# (input · decision-condition · llm-assist · output · governance) as the first-class
# typed `facet:` field (ADR-016 D2 Amendment 2026-06-25 / PLAN-0038): the net-new
# `decision_condition` (a discriminated `gate_kind`) + `llm_assist` are typed, while
# `input`/`output`/`governance` are non-authoritative notes (the typed Step fields
# stay source of truth, D2-A2). The facet was comment-only through Stage-1 (spec.py
# `Step` declared `extra="forbid"`); the Stage-2 amendment promoted it to the typed
# field. The facet map is mirrored in verticals/procurement/README.md so Stage 3 can
# extract the generalized procedure schema from it.

namespace: procurement
version: 0

agents:
  procurement_agent:
    name: Emergency Sourcing Agent
    llm_model: gpt-oss:20b          # ADR-001 default local model
    # ceiling = auto: the source + audit steps are `auto` actions, so the agent
    # must be permitted to act un-gated (autonomy_ceiling is the MAX any step may
    # exercise). The approve + issue_po steps stay `gated` regardless (the human
    # go/no-go on an irreversible write).
    autonomy_ceiling: auto
    # PLAN-0055 Step 8 (S1 scheduler demo): the service actor a SCHEDULE-triggered run
    # acts as (SP-4). A headless nightly run has no human requester — it fires as this
    # declared service principal (run_started audit -> actor_kind:"service"), then PARKS
    # at the human DOA gate (RF-3: the service can never approve its own PO). Cross-ref
    # validated against the service_principals block below (spec.py _cross_refs).
    service_principal_ids: [svc-buyer]
    allowed:
      step_kinds: [query, evaluate, action]
      # The procurement action vocabulary the agent may invoke: `emergency_source`
      # for the auto sourcing step; `request_approval` for the gated DOA approval;
      # `issue_po` for the gated PO write; `reorder` for the calm-path; `echo` for
      # the auto audit terminal (a no-op artifact, not an operational action).
      action_handlers: [emergency_source, request_approval, issue_po, reorder, echo]

# Human principals the SoD run-check resolves against (ADR-0026 D1/D4 / PLAN-0044 A1b
# Step 1). Human-author-only (H, ADR-0024 D3) — never model-emitted. `person_id` is the
# canonical identity key SoD compares; `roles` are the approval roles the step->required-role
# map binds against. The requester side (`req-planner`) holds only `requester`; each approver
# holds the generic `approver` role the SoD constraint binds `approve` to, PLUS its DOA tier
# role (the tier role picks WHICH approver — the deferred A1b Step 3 doa_tier executor; SoD
# only needs "an approver, distinct from the requester"). No `principal_aliases` here: the two
# SoD steps resolve to genuinely distinct humans (alias-collapse is exercised in the tests).
principals:
  - person_id: req-planner
    name: "ปรีชา — ผู้วางแผนซ่อมบำรุง (ผู้ขอซื้อ)"
    roles: [requester]
  - person_id: appr-buyer
    name: "สมหญิง — หน.จัดซื้อ"
    roles: [approver, "หน.จัดซื้อ"]
  - person_id: appr-pm
    name: "นรี — ผจก.จัดซื้อ"
    roles: [approver, "ผจก.จัดซื้อ"]
  - person_id: appr-plant
    name: "วิชัย — ผจก.โรงงาน"
    roles: [approver, "ผจก.โรงงาน"]
  - person_id: appr-director
    name: "เดชา — ผอ.โรงงาน"
    roles: [approver, "ผอ."]

# Service principals — the NON-human actors a `schedule`-triggered run acts as (ADR-0028 SP-4;
# PLAN-0053 S2 actor model / PLAN-0055 Step 8). A DISTINCT type from `principals` with NO `roles`
# (spec.py:713-729): a service principal FIRES a run but can NEVER approve a gate (RF-3 keeps the
# human-approver seam typed `Person`, so a service actor cannot reach it by construction). The
# nightly `scheduled_emergency_sourcing_round` runs as `svc-buyer`; its `approve` step still parks
# for a human at the DOA tier. Cross-ref: each id here must back an `Agent.service_principal_ids`
# reference (spec.py _cross_refs:964-972).
service_principals:
  - service_principal_id: svc-buyer
    name: "Auto Buyer (บอทจัดซื้ออัตโนมัติ — ตัว trigger รอบกลางคืน)"

procedures:
  emergency_sourcing_round:
    title: Emergency Sourcing Round
    goal: >-
      A critical production asset has failed. Intake the maintenance request,
      judge each item against the deterministic criticality band, source the
      critical set (on-contract by default, RFQ→AVL only as a logged exception)
      with the LLM summarising quotes but the SCORED RULE selecting the supplier,
      check per-criterion compliance (AVL/tax/cert/sanctions/single-source) which
      blocks the PO on any fail, route the compliant set to a tiered-DOA human
      approval (the LLM drafts the justification + exec-summary; the emergency
      waiver escalates the approver and forces a logged justification but never
      skips a gate), issue the PO on approval, and write an audit record tying
      every decision to the control that governed it.
    run_by: procurement_agent
    trigger: manual                 # L-8: only manual runs in Phase 1
    steps:
      - step_id: intake
        name: Intake the maintenance request
        description: >-
          Read the failure work-order(s) and assemble the enriched purchase-
          requisition set. LLM-assist auto-fills the PR (advisory, editable); it
          does not decide anything.
        kind: query
        facet:
          decision_condition: { gate_kind: none }
          llm_assist: "enrich / auto-fill the PR from the work-order (advisory draft)"
          input: "purchase requisition / CMMS work-order (the failure signal)"
          output: "enriched PR set"
      - step_id: judge
        name: Judge criticality
        description: >-
          Tag each requisition's verdict vs the authored criticality band — breach
          (critical, ≥ 0.8), watch (high, 0.6–0.8), ok (< 0.6). The breach set is
          the emergency-sourcing path. Deterministic: no LLM, no confidence input.
        kind: evaluate
        threshold: 0.8
        direction: above
        watch_margin: 0.2
        facet:
          # in_file_band POINTS AT the typed threshold/direction/watch_margin above —
          # it does NOT re-store the values (single source of truth, D2-A3).
          decision_condition: { gate_kind: in_file_band, band_source: in_file }
          llm_assist: null
          input: "intake set"
          output: "per-item criticality verdict {breach=critical, watch=high, ok}"
          governance: "the verdict is a pure function of the reading + the authored band"
      - step_id: source
        name: Source the critical set
        description: >-
          Propose an emergency-sourcing action per critical item: on-contract
          supplier by default; an off-contract RFQ→AVL path only as a logged
          exception. The LLM summarises quotes; the scored rule selects the
          supplier. action_type emergency_source (a no-op receipt stub today).
        kind: action
        autonomy: auto              # an auto proposal — selection is the deterministic rule
        handler: emergency_source
        tiers:
          canonical: emergency_source
          acceptable: [request_approval]
        # AT-2 typed content (ADR-0025 D2 / PLAN-0042 Step 2). OQ-B = B2: default_source +
        # exception_policy mirror the data adapter (on-contract default, logged RFQ→AVL
        # exception); the criteria WEIGHTS are PROVISIONAL placeholders pending Cray sign-off
        # of the real Fastenal scoring (no explicit weights exist in the data yet).
        governance_content:
          kind: scored_rule
          criteria:
            - { name: criticality, weight: "0.5" }
            - { name: lead_time, weight: "0.3" }
            - { name: unit_price, weight: "0.2" }
          default_source: on_contract
          exception_policy: rfq_avl_logged
        input:
          from: judge               # the named-input fan-out: only the critical subset
          where:
            verdict: breach
        facet:
          decision_condition:
            gate_kind: scored_rule
            note: "on-contract default; RFQ→AVL only as a logged exception"
          llm_assist: "summarise the candidate quotes (advisory)"
          input: "judge (the breach/critical subset)"
          output: "candidate quote(s) per critical item"
          governance: "SELECTION = a scored RULE, never the LLM (governed ≠ generated)"
      # NOTE (Step-3 / Step-7 seam): `compliance` is an evaluate step for facet
      # fidelity, but per-criterion compliance is a RULE gate, not a numeric band —
      # so it is intentionally band-less here (loads + validates via load_procedures),
      # and its facet's decision_condition is `gate_kind: rule_gate` (no band_source).
      # Its runnable executor (tagging each candidate with `compliant` + per-criterion
      # results) is supplied by the Step-7 run harness, NOT the shipped numeric
      # EvaluateStepExecutor. The downstream `approve` step consumes `where {compliant: true}`.
      - step_id: compliance
        name: Check per-criterion compliance
        description: >-
          Evaluate each candidate against the per-criterion compliance rules
          (AVL approved · tax id valid · cert valid · not sanctioned · single-
          source justified). Any failed criterion blocks the PO. Deterministic.
        kind: evaluate
        # AT-2 typed content (ADR-0025 D2 / PLAN-0042 Step 2). OQ-B = B2: the per-criterion
        # predicates mirror the data adapter's compliance_rule_records (human-authored; each
        # blocks the PO on failure — blocks_po is Literal[True], not authorable false).
        governance_content:
          kind: rule_gate
          rules:
            - criterion: avl
              spec: "supplier.avl_status == approved (or a logged emergency AVL exception)"
            - criterion: tax
              spec: "supplier.tax_id present and valid"
            - criterion: cert
              spec: "supplier.cert_status == valid"
            - criterion: sanctions
              spec: "supplier.sanctions_flag == false"
            - criterion: single_source
              spec: "single-source documented and justified"
        facet:
          decision_condition:
            gate_kind: rule_gate
            note: "per-criterion rule gate — AVL · tax · cert · sanctions · single_source"
          llm_assist: null
          input: "source set (the candidate quotes)"
          output: "per-criterion pass/fail; a non-compliant candidate is blocked"
          governance: "blocks the PO on ANY failed criterion (hard gate)"
      - step_id: approve
        name: Tiered DOA approval (human gate)
        description: >-
          Route the compliant set to the human approver at the DOA tier its ฿
          amount demands. The LLM drafts the justification + exec-summary
          (advisory). The emergency waiver relaxes three-bid/sole-source BUT escalates
          the approver authority and forces a logged justification — it never skips
          a gate. SoD holds (requester ≠ approver). The run suspends at
          waiting_human; the human approves/rejects a concrete recommendation.
        kind: action
        autonomy: gated             # the human go/no-go — never the LLM
        handler: request_approval
        # AT-2 typed content (ADR-0025 D2/D3 / PLAN-0042 Step 2). OQ-B = B2: the DOA tiers
        # MIRROR the data adapter's approval_tier_records (max_amount ceilings -> min_amount
        # half-open floors): [0,50k)=หน.จัดซื้อ, [50k,500k)=ผจก.จัดซื้อ, [500k,2M)=ผจก.โรงงาน,
        # [2M,∞)=ผอ. The waiver escalates (never skips) + forces a justification. Pending Cray
        # sign-off of the real Fastenal figures. Money is Decimal (quoted to avoid float).
        governance_content:
          kind: doa_tier
          currency: THB
          tiers:
            - { min_amount: "0", approver_role: "หน.จัดซื้อ" }
            - { min_amount: "50000", approver_role: "ผจก.จัดซื้อ" }
            - { min_amount: "500000", approver_role: "ผจก.โรงงาน" }
            - { min_amount: "2000000", approver_role: "ผอ." }
          emergency_waiver:
            relaxes: [three_bid]
            escalate_to: "ผอ."
            requires_justification: true
        input:
          from: compliance
          where:
            compliant: true
        facet:
          decision_condition:
            gate_kind: doa_tier
            note: "DOA tier band (฿) — escalates the approver above the band"
          llm_assist: "draft the justification + the approver exec-summary (advisory, editable)"
          input: "compliance (the compliant subset)"
          output: "approval decision (human)"
          governance: "tiered DOA + emergency waiver (escalate, never skip) + SoD; HUMAN approves"
      - step_id: issue_po
        name: Issue the purchase order
        description: >-
          Issue the PO for each approved item. A human-gated write: it only
          proposes until a human approves, then issues on resume. action_type
          issue_po (a no-op receipt stub until the real ERP handler ships).
        kind: action
        autonomy: gated
        handler: issue_po
        facet:
          decision_condition: { gate_kind: none }   # mechanical write of the approved decision
          llm_assist: null
          input: "approve (the approved set)"
          output: "PurchaseOrder"
          governance: "human-gated write (only runs on resume after approval)"
      - step_id: audit
        name: Audit record
        description: >-
          Auto audit terminal over the whole run: an LLM-drafted decision summary
          tying each item to the criticality verdict, the sourcing rule, the
          compliance criteria, and the approval tier / waiver that governed it.
        kind: action
        autonomy: auto
        handler: echo
        input:
          from: judge               # no `where` -> the whole verdict set
        facet:
          decision_condition: { gate_kind: none }
          llm_assist: "draft the decision summary (advisory)"
          input: "judge (the full run verdict set)"
          output: "audit record"
          governance: "ties every row to the control that governed it (traceability)"
    terminal: audit
    # AT-2 separation of duties (ADR-0025 D2/D5 / PLAN-0042 Step 2). The requester (intake)
    # must not also be the approver (approve). Author time = the STRUCTURAL distinct-steps
    # form (>=2 distinct real steps). The resolved-PRINCIPAL distinctness (fail-closed on a
    # PK match OR an alias-collapse) is now the LIVE run check (ADR-0026 D4 / PLAN-0044 A1b
    # Step 1): `required_roles` binds each constrained step to the role its acting Person
    # must hold, so the run-check resolves intake->requester->Person and approve->approver->
    # Person and fails closed if either is unresolvable or the two collapse to one human.
    separation_of_duties:
      - distinct_steps: [intake, approve]
        required_roles:
          intake: requester
          approve: approver

  low_stock_reorder_round:
    title: Low-Stock Reorder Round
    goal: >-
      The familiar MRO calm-path on the same engine + agent: read each part's
      stock level, judge it against its reorder point, and reorder the low-stock
      set after a single human go/no-go. The contrast to the hero — routine,
      single-tier, no emergency waiver — on one shared governed procedure engine.
    run_by: procurement_agent
    trigger: manual
    steps:
      # PLAN-0064 — MIGRATED (the PLAN-0062 AC-7 deferral discharged). ERRATUM 2's record
      # stands: the substrate was never the blocker (the ontology declares Part.stock_qty +
      # Part.reorder_point and the registry-registered ProcurementSyntheticAdapter emits
      # both); EXECUTOR ROUTING was. The production factory's QUERY slot is now the
      # per-step QueryStepRouter (declaration-presence, SD-1 — hero_demo/run.py::_executors):
      # this step's declared `reads: [Part]` dispatches to the SHIPPED QueryStepExecutor
      # over the registry-registered adapter (SD-5), while the undeclared `intake` keeps
      # the co-existing _SeedQuery byte-identically (PLAN-0062 SD-C carried).
      # Pinned in tests/verticals/procurement/test_intake_shadow_parity.py (the rewritten
      # tripwire — it now fails if a declared read is ever handed the seed again).
      # See docs/plans/0064-per-step-query-router-procurement.md.
      - step_id: read_stock
        name: Read stock levels
        description: Latest stock reading per stocked Part.
        kind: query
        input:                          # PLAN-0064: the declared single-read (PLAN-0048 shape)
          reads: [Part]
        facet:
          decision_condition:
            gate_kind: none
            note: "PLAN-0064: migrated — the declared read routes to the shipped QueryStepExecutor via the per-step QUERY router"
          llm_assist: null
          input: "declared read: Part (stock_qty, reorder_point per part)"
          output: "stock reading per part"
      - step_id: judge_stock
        name: Judge vs reorder point
        description: >-
          Tag each part's verdict vs its reorder point — breach (stock ≤ reorder
          point) is the reorder set. The threshold mirrors the demo part's reorder
          point; a per-part band is a Stage-2 refinement (a single fixed band runs
          the calm-path beat). Deterministic.
        kind: evaluate
        threshold: 100.0
        direction: below
        facet:
          # in_file_band POINTS AT the typed threshold/direction above — no re-store (D2-A3).
          decision_condition: { gate_kind: in_file_band, band_source: in_file }
          llm_assist: null
          input: "read_stock set"
          output: "per-part verdict {breach=at/below reorder point}"
          governance: "determinism invariant (authored band)"
      - step_id: reorder
        name: Reorder the low-stock set
        description: >-
          Propose an on-contract reorder per low-stock part; a single human go/no-
          go approves it (the routine, single-tier calm-path — no emergency waiver,
          no escalated DOA). action_type reorder (a no-op receipt stub today).
        kind: action
        autonomy: gated
        handler: reorder
        input:
          from: judge_stock
          where:
            verdict: breach
        facet:
          decision_condition:
            gate_kind: none
            note: "on-contract reorder at the contracted price"
          llm_assist: null
          input: "judge_stock (the low-stock subset)"
          output: "reorder PurchaseOrder"
          governance: "single-tier human approval (the calm contrast to the hero DOA ladder)"
    terminal: reorder

  # ---------------------------------------------------------------------------
  # PLAN-0055 Step 8 — the S1 `schedule`-trigger demo procedure.
  #
  # The SAME governed emergency-sourcing beat as `emergency_sourcing_round`, but fired
  # AUTOMATICALLY on a nightly clock (ADR-0028 S1 scheduler) instead of by a human. The
  # scheduler daemon (`vero-lite scheduler --vertical procurement`) resolves this via
  # scheduler_wiring.build_resolver + fires it through run_procedure_persisted as the declared
  # `svc-buyer` service principal (run_started audit -> actor_kind:"service", SP-4). It runs the
  # auto steps (intake -> judge -> source -> compliance) and PARKS at the `approve` DOA gate:
  # RF-3 forbids a service actor from approving, so a HUMAN purchasing manager must resolve it
  # (GET the parked run in the Monitor -> POST /runs/{id}/gate/resolve). On approval the run
  # writes its audit terminal and completes. NO PO issues until the human acts.
  #
  # A DISTINCT procedure_id (not a flip of `emergency_sourcing_round`) because: (a) `trigger` is a
  # single enum — a schedule descriptor is present IFF trigger==schedule (spec.py:823-842), so
  # flipping the existing one would break its manual runs; (b) SD-P3 skip-if-in-flight keys on
  # procedure_id — a distinct id never collides with a parked manual `emergency_sourcing_round`
  # run (the OCT operate-demo seed).
  #
  # ON BEHALF OF a human (SP-5): the run fires as the `svc-buyer` service principal but acts on
  # behalf of `req-planner` (the maintenance planner who owns the nightly sweep) — `owning_person_id`
  # below. This matters because a `doa_tier` gate REQUIRES a `separation_of_duties` constraint
  # (ADR-0025 D5), and SoD needs a human requester on `intake`: a fully headless run would record
  # `{intake: None}` and the run-check would fail CLOSED at the gate (principal_sod
  # UNRESOLVED_PRINCIPAL). So the scheduler records `req-planner` as the requester (the accountable
  # human the automation sources for), and a DISTINCT human — the DOA-tier purchasing manager
  # (`appr-pm`) — must approve. SoD holds (requester != approver); the service actor can never
  # approve, by construction (RF-3). run_started audit -> actor_kind:"service",
  # on_behalf_of:{service_principal_id: svc-buyer, owning_person_id: req-planner}.
  scheduled_emergency_sourcing_round:
    title: Nightly Emergency Sourcing Round (scheduled)
    goal: >-
      The governed emergency-sourcing round on a nightly clock: automatically intake the open
      failure work-orders (on behalf of the maintenance planner), judge each item against the
      deterministic criticality band, source the critical set (on-contract by default, RFQ->AVL
      only as a logged exception) with the LLM summarising quotes but the SCORED RULE selecting the
      supplier, check per-criterion compliance which blocks the PO on any fail, then route the
      compliant set to the tiered-DOA HUMAN approval gate — the automated run proposes, but a
      distinct human purchasing manager must approve the spend (SoD: requester != approver; the
      service actor can never approve, RF-3). Write an audit record on approval.
    run_by: procurement_agent
    trigger: schedule
    schedule:
      cron: "0 6 * * *"               # 06:00 daily — the overnight sweep, before the day shift
      timezone: Asia/Bangkok          # SD-P1: per-schedule IANA tz (validated vs zoneinfo at load)
      owning_person_id: req-planner   # SP-5: the human the headless run acts on behalf of (= the
                                      # SoD requester on `intake`, so a distinct approver governs)
    steps:
      - step_id: intake
        name: Intake the maintenance request
        description: >-
          Read the failure work-order(s) and assemble the enriched purchase-requisition set.
          LLM-assist auto-fills the PR (advisory, editable); it does not decide anything.
        kind: query
        facet:
          decision_condition: { gate_kind: none }
          llm_assist: "enrich / auto-fill the PR from the work-order (advisory draft)"
          input: "purchase requisition / CMMS work-order (the failure signal)"
          output: "enriched PR set"
      - step_id: judge
        name: Judge criticality
        description: >-
          Tag each requisition's verdict vs the authored criticality band — breach
          (critical, >= 0.8), watch (high, 0.6-0.8), ok (< 0.6). The breach set is the
          emergency-sourcing path. Deterministic: no LLM, no confidence input.
        kind: evaluate
        threshold: 0.8
        direction: above
        watch_margin: 0.2
        facet:
          decision_condition: { gate_kind: in_file_band, band_source: in_file }
          llm_assist: null
          input: "intake set"
          output: "per-item criticality verdict {breach=critical, watch=high, ok}"
          governance: "the verdict is a pure function of the reading + the authored band"
      - step_id: source
        name: Source the critical set
        description: >-
          Propose an emergency-sourcing action per critical item: on-contract supplier by
          default; an off-contract RFQ->AVL path only as a logged exception. The LLM summarises
          quotes; the scored rule selects the supplier.
        kind: action
        autonomy: auto
        handler: emergency_source
        tiers:
          canonical: emergency_source
          acceptable: [request_approval]
        governance_content:
          kind: scored_rule
          criteria:
            - { name: criticality, weight: "0.5" }
            - { name: lead_time, weight: "0.3" }
            - { name: unit_price, weight: "0.2" }
          default_source: on_contract
          exception_policy: rfq_avl_logged
        input:
          from: judge
          where:
            verdict: breach
        facet:
          decision_condition:
            gate_kind: scored_rule
            note: "on-contract default; RFQ->AVL only as a logged exception"
          llm_assist: "summarise the candidate quotes (advisory)"
          input: "judge (the breach/critical subset)"
          output: "candidate quote(s) per critical item"
          governance: "SELECTION = a scored RULE, never the LLM (governed != generated)"
      - step_id: compliance
        name: Check per-criterion compliance
        description: >-
          Evaluate each candidate against the per-criterion compliance rules (AVL approved · tax
          id valid · cert valid · not sanctioned · single-source justified). Any failed criterion
          blocks the PO. Deterministic.
        kind: evaluate
        governance_content:
          kind: rule_gate
          rules:
            - criterion: avl
              spec: "supplier.avl_status == approved (or a logged emergency AVL exception)"
            - criterion: tax
              spec: "supplier.tax_id present and valid"
            - criterion: cert
              spec: "supplier.cert_status == valid"
            - criterion: sanctions
              spec: "supplier.sanctions_flag == false"
            - criterion: single_source
              spec: "single-source documented and justified"
        facet:
          decision_condition:
            gate_kind: rule_gate
            note: "per-criterion rule gate — AVL · tax · cert · sanctions · single_source"
          llm_assist: null
          input: "source set (the candidate quotes)"
          output: "per-criterion pass/fail; a non-compliant candidate is blocked"
          governance: "blocks the PO on ANY failed criterion (hard gate)"
      - step_id: approve
        name: Tiered DOA approval (human gate)
        description: >-
          Route the compliant set to the human approver at the DOA tier its THB amount demands.
          The LLM drafts the justification + exec-summary (advisory). The run SUSPENDS at
          waiting_human; a human approves/rejects a concrete recommendation. The automated
          service actor can NEVER reach this gate (RF-3) — a human must decide.
        kind: action
        autonomy: gated
        handler: request_approval
        governance_content:
          kind: doa_tier
          currency: THB
          tiers:
            - { min_amount: "0", approver_role: "หน.จัดซื้อ" }
            - { min_amount: "50000", approver_role: "ผจก.จัดซื้อ" }
            - { min_amount: "500000", approver_role: "ผจก.โรงงาน" }
            - { min_amount: "2000000", approver_role: "ผอ." }
          emergency_waiver:
            relaxes: [three_bid]
            escalate_to: "ผอ."
            requires_justification: true
        input:
          from: compliance
          where:
            compliant: true
        facet:
          decision_condition:
            gate_kind: doa_tier
            note: "DOA tier band (THB) — escalates the approver above the band"
          llm_assist: "draft the justification + the approver exec-summary (advisory, editable)"
          input: "compliance (the compliant subset)"
          output: "approval decision (human)"
          governance: "tiered DOA + emergency waiver (escalate, never skip); HUMAN approves (RF-3)"
      - step_id: audit
        name: Audit record
        description: >-
          Auto audit terminal over the whole run: an LLM-drafted decision summary tying each item
          to the criticality verdict, the sourcing rule, the compliance criteria, and the approval
          tier / waiver that governed it.
        kind: action
        autonomy: auto
        handler: echo
        input:
          from: judge
        facet:
          decision_condition: { gate_kind: none }
          llm_assist: "draft the decision summary (advisory)"
          input: "judge (the full run verdict set)"
          output: "audit record"
          governance: "ties every row to the control that governed it (traceability)"
    terminal: audit
    # Separation of duties (required for a doa_tier procedure, ADR-0025 D5). The requester
    # (`intake`, recorded as the schedule's owning_person_id `req-planner` at fire time) must not
    # also be the approver (`approve`). A scheduled run fires headless as `svc-buyer`, but acts ON
    # BEHALF OF `req-planner`, so the run-check resolves intake->requester->req-planner and
    # approve->approver->(the DOA-tier human, `appr-pm` for the ฿288k tier) and fails closed if
    # they collapse to one human. Same structural + resolved-principal form as the manual hero.
    separation_of_duties:
      - distinct_steps: [intake, approve]
        required_roles:
          intake: requester
          approve: approver

  # --- PLAN-0056 Step 8 (ADR-0029 event-trigger bridge) — the EVENT-triggered variant ----------
  #
  # The SAME governed emergency-sourcing beat as `emergency_sourcing_round`, but fired
  # AUTOMATICALLY when the OCT recommender detects an actionable asset-failure condition (ADR-0029
  # event bridge) — instead of by a human (manual) or a nightly clock (scheduled). When
  # `event_bridge_enabled` is on, the recommender loop (services/api/routers/actions.py
  # `_populate_store`) FEEDS the actionable detection INTO the governed engine: build_event_resolver
  # maps the event -> this procedure (by `event_kind`) and fire_event drives run_procedure_persisted
  # as the declared `svc-buyer` service principal (run_started audit -> actor_kind:"service", SP-4).
  # It runs the auto steps (intake -> judge -> source -> compliance) and PARKS at the `approve` DOA
  # gate: RF-3 forbids a service actor from approving, so a HUMAN purchasing manager must resolve it.
  # NO PO issues until the human acts.
  #
  # `event_kind: emergency_source` — matched against the recommender's actionable detection by the
  # Step-4 resolver. PLAN-0056 Step 6 pinned `event_kind = RecommendedAction.suggested_handler` (the
  # envelope has NO `action_type`; its action discriminator is the proposed handler). So this
  # procedure fires when the recommender proposes the `emergency_source` action on a detected asset
  # failure — feeding that lightweight proposal INTO the full governed sourcing beat instead of the
  # ActionRecord execute gate. (The live end-to-end path is host-state, CLAUDE.md §8; the offline
  # DB-backed integration test is the gate.)
  #
  # A DISTINCT procedure_id (not a flip of `emergency_sourcing_round`) for the same reasons the
  # scheduled variant is distinct: (a) `trigger` is a single enum — an `event_trigger` descriptor is
  # present IFF trigger==event (spec.py), so flipping the manual one would break its manual runs;
  # (b) SD-P4 skip-if-in-flight keys on procedure_id — a distinct id never collides with a parked
  # manual `emergency_sourcing_round` run (the OCT operate-demo seed).
  #
  # ON BEHALF OF a human (SP-5): fires as `svc-buyer` but acts on behalf of `req-planner` (the
  # maintenance planner who owns the failure response) via `owning_person_id`. A `doa_tier` gate
  # REQUIRES a `separation_of_duties` constraint (ADR-0025 D5), and SoD needs a human requester on
  # `intake`: a fully headless run would record `{intake: None}` and fail CLOSED at the gate
  # (principal_sod UNRESOLVED_PRINCIPAL). So the event run records `req-planner` as the requester,
  # and a DISTINCT human — the DOA-tier purchasing manager (`appr-pm`) — must approve. SoD holds
  # (requester != approver); the service actor can never approve, by construction (RF-3).
  event_emergency_sourcing_round:
    title: Emergency Sourcing Round (event-triggered)
    goal: >-
      The governed emergency-sourcing round fired AUTOMATICALLY on a detected asset-failure event
      (ADR-0029 event bridge, on behalf of the maintenance planner): intake the open failure
      work-orders, judge each item against the deterministic criticality band, source the critical
      set (on-contract by default, RFQ->AVL only as a logged exception) with the LLM summarising
      quotes but the SCORED RULE selecting the supplier, check per-criterion compliance which blocks
      the PO on any fail, then route the compliant set to the tiered-DOA HUMAN approval gate — the
      automated run proposes, but a distinct human purchasing manager must approve the spend (SoD:
      requester != approver; the service actor can never approve, RF-3). Write an audit record on
      approval.
    run_by: procurement_agent
    trigger: event
    event_trigger:
      event_kind: emergency_source    # = RecommendedAction.suggested_handler (PLAN-0056 Step 6):
                                      # fires when the recommender proposes emergency_source on a
                                      # detected asset failure. Unique across the vertical's event
                                      # procedures (cross-ref validated at load).
      owning_person_id: req-planner   # SP-5: the human the headless run acts on behalf of (= the
                                      # SoD requester on `intake`, so a distinct approver governs)
    steps:
      - step_id: intake
        name: Intake the maintenance request
        description: >-
          Read the failure work-order(s) and assemble the enriched purchase-requisition set.
          LLM-assist auto-fills the PR (advisory, editable); it does not decide anything.
        kind: query
        facet:
          decision_condition: { gate_kind: none }
          llm_assist: "enrich / auto-fill the PR from the work-order (advisory draft)"
          input: "purchase requisition / CMMS work-order (the failure signal)"
          output: "enriched PR set"
      - step_id: judge
        name: Judge criticality
        description: >-
          Tag each requisition's verdict vs the authored criticality band — breach
          (critical, >= 0.8), watch (high, 0.6-0.8), ok (< 0.6). The breach set is the
          emergency-sourcing path. Deterministic: no LLM, no confidence input.
        kind: evaluate
        threshold: 0.8
        direction: above
        watch_margin: 0.2
        facet:
          decision_condition: { gate_kind: in_file_band, band_source: in_file }
          llm_assist: null
          input: "intake set"
          output: "per-item criticality verdict {breach=critical, watch=high, ok}"
          governance: "the verdict is a pure function of the reading + the authored band"
      - step_id: source
        name: Source the critical set
        description: >-
          Propose an emergency-sourcing action per critical item: on-contract supplier by
          default; an off-contract RFQ->AVL path only as a logged exception. The LLM summarises
          quotes; the scored rule selects the supplier.
        kind: action
        autonomy: auto
        handler: emergency_source
        tiers:
          canonical: emergency_source
          acceptable: [request_approval]
        governance_content:
          kind: scored_rule
          criteria:
            - { name: criticality, weight: "0.5" }
            - { name: lead_time, weight: "0.3" }
            - { name: unit_price, weight: "0.2" }
          default_source: on_contract
          exception_policy: rfq_avl_logged
        input:
          from: judge
          where:
            verdict: breach
        facet:
          decision_condition:
            gate_kind: scored_rule
            note: "on-contract default; RFQ->AVL only as a logged exception"
          llm_assist: "summarise the candidate quotes (advisory)"
          input: "judge (the breach/critical subset)"
          output: "candidate quote(s) per critical item"
          governance: "SELECTION = a scored RULE, never the LLM (governed != generated)"
      - step_id: compliance
        name: Check per-criterion compliance
        description: >-
          Evaluate each candidate against the per-criterion compliance rules (AVL approved · tax
          id valid · cert valid · not sanctioned · single-source justified). Any failed criterion
          blocks the PO. Deterministic.
        kind: evaluate
        governance_content:
          kind: rule_gate
          rules:
            - criterion: avl
              spec: "supplier.avl_status == approved (or a logged emergency AVL exception)"
            - criterion: tax
              spec: "supplier.tax_id present and valid"
            - criterion: cert
              spec: "supplier.cert_status == valid"
            - criterion: sanctions
              spec: "supplier.sanctions_flag == false"
            - criterion: single_source
              spec: "single-source documented and justified"
        facet:
          decision_condition:
            gate_kind: rule_gate
            note: "per-criterion rule gate — AVL · tax · cert · sanctions · single_source"
          llm_assist: null
          input: "source set (the candidate quotes)"
          output: "per-criterion pass/fail; a non-compliant candidate is blocked"
          governance: "blocks the PO on ANY failed criterion (hard gate)"
      - step_id: approve
        name: Tiered DOA approval (human gate)
        description: >-
          Route the compliant set to the human approver at the DOA tier its THB amount demands.
          The LLM drafts the justification + exec-summary (advisory). The run SUSPENDS at
          waiting_human; a human approves/rejects a concrete recommendation. The automated
          service actor can NEVER reach this gate (RF-3) — a human must decide.
        kind: action
        autonomy: gated
        handler: request_approval
        governance_content:
          kind: doa_tier
          currency: THB
          tiers:
            - { min_amount: "0", approver_role: "หน.จัดซื้อ" }
            - { min_amount: "50000", approver_role: "ผจก.จัดซื้อ" }
            - { min_amount: "500000", approver_role: "ผจก.โรงงาน" }
            - { min_amount: "2000000", approver_role: "ผอ." }
          emergency_waiver:
            relaxes: [three_bid]
            escalate_to: "ผอ."
            requires_justification: true
        input:
          from: compliance
          where:
            compliant: true
        facet:
          decision_condition:
            gate_kind: doa_tier
            note: "DOA tier band (THB) — escalates the approver above the band"
          llm_assist: "draft the justification + the approver exec-summary (advisory, editable)"
          input: "compliance (the compliant subset)"
          output: "approval decision (human)"
          governance: "tiered DOA + emergency waiver (escalate, never skip); HUMAN approves (RF-3)"
      - step_id: audit
        name: Audit record
        description: >-
          Auto audit terminal over the whole run: an LLM-drafted decision summary tying each item
          to the criticality verdict, the sourcing rule, the compliance criteria, and the approval
          tier / waiver that governed it.
        kind: action
        autonomy: auto
        handler: echo
        input:
          from: judge
        facet:
          decision_condition: { gate_kind: none }
          llm_assist: "draft the decision summary (advisory)"
          input: "judge (the full run verdict set)"
          output: "audit record"
          governance: "ties every row to the control that governed it (traceability)"
    terminal: audit
    # Separation of duties (required for a doa_tier procedure, ADR-0025 D5). Same structural +
    # resolved-principal form as the scheduled/manual hero: the requester (`intake`, recorded as the
    # event_trigger's owning_person_id `req-planner` at fire time) must not also be the approver
    # (`approve`). The event run fires as `svc-buyer` ON BEHALF OF `req-planner`, so the run-check
    # resolves intake->requester->req-planner and approve->approver->(`appr-pm` for the ฿288k tier)
    # and fails closed if they collapse to one human.
    separation_of_duties:
      - distinct_steps: [intake, approve]
        required_roles:
          intake: requester
          approve: approver
