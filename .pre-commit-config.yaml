repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.9.0
          - pydantic-settings>=2.5.0
          - fastapi>=0.115.0
          - sqlalchemy>=2.0.35
          - httpx>=0.27.0
          - typer>=0.12.0
          - ruamel.yaml>=0.18.0
          - jsonschema>=4.23.0
          - types-jsonschema>=4.23.0
          - types-croniter>=2.0.0
        args: [--config-file=pyproject.toml]
        # PLAN-0008 Step 7: extend coverage to .claude/hooks/** so the
        # Phase 2 hook scripts (Step 1–5b) are gated at commit time, not
        # only when a developer remembers to run mypy locally. All 9
        # current hook files pass --strict cleanly as of 2026-05-24.
        files: ^(services|verticals|\.claude/hooks)/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package.lock.json

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.29.4
    hooks:
      - id: check-jsonschema
        name: check ontology YAML against ADR-008 D2 schema
        files: ^verticals/.*/ontology/.*\.yaml$
        args: ['--schemafile', 'services/engine/ontology_schema.json']

  # PLAN-004 Phase B: validate the LATEST session's handoff frontmatter and
  # refresh its INDEX.md on every commit. Handoffs are gitignored (never
  # staged), so this is a working-tree check: always_run + pass_filenames:false.
  # Scoped to the newest session-NN only (no legacy drag); blocks the commit on
  # an error-severity finding in the active session.
  - repo: local
    hooks:
      - id: handoff-frontmatter
        name: validate latest-session handoffs + refresh INDEX
        entry: uv run python tools/handoffs/precommit_handoffs.py
        language: system
        always_run: true
        pass_filenames: false

      # Rotation policy R1 (Lesson #23): docs/STATUS.md hard ceiling 64 KB /
      # soft 48 KB. The authoritative deterministic check — the status-scribe
      # has no Bash and can only enforce structural counts (R2/R3).
      - id: status-size-guard
        name: STATUS.md size guard (R1 — 64 KB hard ceiling)
        entry: uv run python tools/check_status_size.py
        language: system
        files: ^docs/STATUS\.md$
        pass_filenames: false
