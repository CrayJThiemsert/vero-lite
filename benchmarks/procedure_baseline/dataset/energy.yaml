# Procedure-baseline ground truth — energy (PLAN-0019 B-β; FILL to SD-B2 size).
#
# "Substation Health Sweep": asset temperature breaches ABOVE the ceiling
# (OCT_RECOMMEND_DIRECTION=above; crosses_threshold => measured >= 90.0 is a
# breach). Verdict bands (judge step):
#   breach: temp >= 90.0 C   watch: 85.0 <= temp < 90.0   ok: temp < 85.0
# The 90.0 C ceiling + watch_margin 5.0 are provisional values (the energy
# ontology carries no numeric threshold — it lives in demo/env config); pin the
# exact ceiling against energy_v0.yaml + the demo config before the external-grade
# RUN. 66 items: 40 breach (28 boundary cluster near 90.0 + 12 PR2 HARD multi-entity
# decoy / near-miss items, ids energy-h01..h12 — the discriminating mass), 13 watch,
# 13 ok.
#
# Graded fields (LLM proposal): β headline = affected_primary_key (right asset) +
# action_keywords (the 'restart' action class); α probe = valid_handlers ([restart],
# the correct ontology action_type vs the isolate/dispatch/escalate near-misses).

vertical: energy
procedure: substation_health_sweep
reading_parameter: temperature
threshold_note: >-
  PROVISIONAL 90.0 C over-temperature ceiling, breach ABOVE; watch band 5.0
  (85.0-90.0). Pin the exact ceiling against energy_v0.yaml + demo config.

