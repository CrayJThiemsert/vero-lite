      watch_margin: 5.0
    expected:
      disposition: breach
      action_expected: true
      affected_primary_key: asset-T2
      valid_handlers: [echo]
      action_keywords: [restart]

  - id: energy-003
    description: 90.0 C — boundary; inclusive breach (measured >= threshold).
    scenario:
      event_id: energy-evt-003
      entity_type: Asset
      primary_key: asset-T3
      measured_value: 90.0
      unit: celsius
      threshold: 90.0
      direction: above
      watch_margin: 5.0
    expected:
      disposition: breach
      action_expected: true
      affected_primary_key: asset-T3
      valid_handlers: [echo]
      action_keywords: [restart]

  - id: energy-004
    description: 88.5 C — watch (within 5 C of the ceiling).
    scenario:
      event_id: energy-evt-004
      entity_type: Asset
      primary_key: asset-T4
      measured_value: 88.5
      unit: celsius
      threshold: 90.0
      direction: above
      watch_margin: 5.0
    expected:
      disposition: watch
      action_expected: false

  - id: energy-005
