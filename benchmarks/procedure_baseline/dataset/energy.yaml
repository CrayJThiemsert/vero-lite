# Procedure-baseline ground truth — energy (PLAN-0019 B-β seed slice).
#
# "Substation Health Sweep": asset temperature breaches ABOVE the ceiling
# (OCT_RECOMMEND_DIRECTION=above; crosses_threshold => measured >= 90.0 is a
# breach). Verdict bands (judge step):
#   breach: temp >= 90.0 C   watch: 85.0 <= temp < 90.0   ok: temp < 85.0
# The 90.0 C ceiling + watch_margin 5.0 are provisional SCAFFOLD values (the
# energy ontology carries no numeric threshold — it lives in demo/env config);
# the FILL PR pins the exact ceiling against energy_v0.yaml + the demo config and
# grows the set to ~50-60, weighted to breach + the boundary edge.
#
# Graded fields (LLM proposal): affected_primary_key (right asset), valid_handlers
# ([echo] today), action_keywords (the 'restart' action class).

vertical: energy
procedure: substation_health_sweep
threshold_note: >-
  PROVISIONAL 90.0 C over-temperature ceiling, breach ABOVE; watch band 5.0
  (85.0-90.0). Exact ceiling pinned during FILL against energy_v0.yaml + demo config.

items:
  - id: energy-001
    description: 102.0 C — severe over-temperature, clear breach.
    scenario:
      event_id: energy-evt-001
      entity_type: Asset
      primary_key: asset-T1
      measured_value: 102.0
      unit: celsius
      threshold: 90.0
      direction: above
      watch_margin: 5.0
    expected:
      disposition: breach
      action_expected: true
      affected_primary_key: asset-T1
      valid_handlers: [echo]
      action_keywords: [restart]

  - id: energy-002
    description: 96.5 C — breach (the structured-output fixture reading).
    scenario:
      event_id: energy-evt-002
      entity_type: Asset
