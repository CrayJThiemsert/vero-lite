# Procedure-baseline ground truth — supply_chain (PLAN-0019 B-β; FILL to SD-B2 size).
#
# "Cold-Chain Excursion Sweep": a shipment temperature breaches ABOVE the
# cold-chain ceiling (OCT_RECOMMEND_DIRECTION=above; crosses_threshold =>
# measured >= 8.0 is a breach). Verdict bands (judge step):
#   breach: temp >= 8.0 C   watch: 6.5 <= temp < 8.0   ok: temp < 6.5
# The 8.0 C ceiling + watch_margin 1.5 are provisional values (the supply_chain
# ontology carries no numeric threshold — it lives in demo/env config); pin the
# exact ceiling against supply_chain_v0.yaml + the demo config before the
# external-grade RUN. 54 items: breach-weighted (28 breach with a dense boundary
# cluster near 8.0 — the LLM-graded mass), 13 watch, 13 ok.
#
# Graded fields (LLM proposal): affected_primary_key (right shipment),
# valid_handlers ([echo] today), action_keywords (the 'hold' action class).

vertical: supply_chain
procedure: cold_chain_excursion_sweep
reading_parameter: temperature
threshold_note: >-
  PROVISIONAL 8.0 C cold-chain ceiling, breach ABOVE; watch band 1.5 (6.5-8.0).
  Pin the exact ceiling against supply_chain_v0.yaml + demo config.

items:
