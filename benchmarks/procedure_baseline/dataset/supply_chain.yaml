    description: 10.5 C — cold-chain excursion; breach.
    scenario: {event_id: supply-evt-001, entity_type: Shipment, primary_key: ship-S01, measured_value: 10.5, unit: celsius, threshold: 8.0, direction: above, watch_margin: 1.5}
    expected: {disposition: breach, action_expected: true, affected_primary_key: ship-S01, valid_handlers: [echo], action_keywords: [hold, inspect, quarantine, divert]}
