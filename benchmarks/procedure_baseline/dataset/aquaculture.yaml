    expected: {disposition: breach, action_expected: true, affected_primary_key: pond-A01, canonical_handler: start_emergency_aerator, acceptable_handlers: [increase_water_exchange], action_keywords: [aerat, oxygenat], payload_contains: {pond_id: pond-A01}}
