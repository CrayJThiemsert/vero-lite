# Procedure-baseline ground truth — aquaculture (PLAN-0019 B-β; FILL to SD-B2 size).
#
# Headline vertical: the "Morning Pond Health Round". Dissolved oxygen (DO) is a
# CRASH signal — it breaches BELOW the floor (OCT_RECOMMEND_DIRECTION=below;
# crosses_threshold => measured <= 4.0 is a breach). Verdict bands (judge step):
#   breach: DO <= 4.0 mg/L   watch: 4.0 < DO <= 5.0   ok: DO > 5.0
# Threshold 4.0 mg/L + watch_margin 1.0 are grounded in aquaculture_v0.yaml +
# verticals/aquaculture/procedures.yaml. 66 items: 40 breach (28 boundary cluster
# near 4.0 + 12 PR2 HARD multi-entity decoy / near-miss items, ids aqua-h01..h12 —
# the discriminating mass), 13 watch, 13 ok.
#
# Graded fields (LLM proposal): β headline = affected_primary_key (right pond) +
# action_keywords (the 'aerate' action class); tiered α probe (PLAN-0022 Step 1) =
# canonical_handler start_emergency_aerator + acceptable_handlers
# [increase_water_exchange] (a real DO remedy — the PLAN-0020 REPORT-verified
# benign divergence; dispatch/escalate stay 'other'). payload_contains is exercised
# on ONE item (aqua-001) as an advisory signal; the exact payload KEY the live
# model emits is calibrated against real output during the RUN.
# Watch-tier ground truth (M-2=b pinning, Cray-adjudicated 2026-06-12 from the
# REPORT calibration distribution): canonical start_emergency_aerator +
# acceptable [dispatch_technician, increase_water_exchange, escalate].
# Item style: block list; scenario/expected as compact flow mappings (reviewable).
# Self-consistency (declared disposition == classify_disposition) is CI-asserted.

vertical: aquaculture
procedure: morning_pond_health_round
reading_parameter: dissolved_oxygen
threshold_note: >-
  DO 4.0 mg/L, breach BELOW (crosses_threshold direction=below); watch band 1.0
  (4.0-5.0). Grounded in aquaculture_v0.yaml + procedures.yaml judge step.

