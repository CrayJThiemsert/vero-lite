# Gold set for the NL-query feasibility spike (session 58).
#
# Each case = a plain-language operator question over the SHIPPED engine-A
# path (services/engine/nl_query.py: translate -> execute -> phrase) run
# against the deterministic energy synthetic data
# (verticals/energy/data_adapter/synthetic.py). Every gold answer below is
# verified by hand against that data.
#
# Two classes:
#   ceiling: false  = expressible by a single-object-type StructuredQuery
#                     (conjunctive filters + list/count). Scored on
#                     result_ok = the EXECUTED result matches expected_ids /
#                     expected_count (deterministic; invariant to how the
#                     filter was phrased).
#   ceiling: true   = NOT cleanly expressible by StructuredQuery (needs a
#                     superlative / cross-type join / aggregate beyond count /
#                     group-by). Scored on answer_ok = the final phrased
#                     answer contains every expected_answer_substring — this
#                     measures whether the 3-stage design's PHRASE step (an
#                     LLM reasoning over the retrieved rows) RESCUES a query
#                     the StructuredQuery layer alone cannot express.
#
# The honesty probe (nl-12) has no backing data and must short-circuit to the
# deterministic "no records" answer (grounded=false) — the anti-hallucination
# guard (PLAN-0013 AC-nlquery).

vertical: energy

cases:
  # --- expressible by StructuredQuery (7) ------------------------------------
  - id: nl-01
    text: "List all battery assets."
    category: filter-enum
    ceiling: false
    expected_object_type: Asset
    expected_operation: list
    expected_filters:
      - {property: asset_type, op: eq, value: battery}
    expected_ids: [asset-battery-01, asset-battery-02]
    expected_count: 2
    expected_grounded: true

  - id: nl-02
    text: "How many operational events are recorded in total?"
    category: count
    ceiling: false
    expected_object_type: OperationalEvent
    expected_operation: count
    expected_filters: []
    expected_ids:
      - event-transition-01
      - event-reading-04
      - event-reading-01
      - event-reading-02
      - event-reading-09
      - event-reading-10
      - event-reading-11
      - event-reading-05
      - event-reading-06
      - event-alarm-01
      - event-reading-03
    expected_count: 11
    expected_grounded: true

  - id: nl-03
    text: "Which operational events have a measured value greater than 80?"
    category: filter-numeric
    ceiling: false
    expected_object_type: OperationalEvent
    expected_operation: list
    expected_filters:
      - {property: measured_value, op: gt, value: "80"}
    expected_ids: [event-reading-06, event-reading-03]
    expected_count: 2
    expected_grounded: true

  - id: nl-04
    text: "List all critical-severity events."
    category: filter-enum
    ceiling: false
    expected_object_type: OperationalEvent
    expected_operation: list
    expected_filters:
      - {property: severity, op: eq, value: critical}
    expected_ids: [event-reading-03]
    expected_count: 1
    expected_grounded: true

  - id: nl-05
    text: "How many warning-severity events are there?"
    category: count
    ceiling: false
    expected_object_type: OperationalEvent
    expected_operation: count
    expected_filters:
      - {property: severity, op: eq, value: warn}
    expected_ids: [event-reading-06]
    expected_count: 1
    expected_grounded: true

  - id: nl-06
    text: "Show the asset named Battery Bank A."
    category: filter-name
    ceiling: false
    expected_object_type: Asset
    expected_operation: list
    expected_filters:
      - {property: name, op: eq, value: Battery Bank A}
    expected_ids: [asset-battery-01]
    expected_count: 1
    expected_grounded: true

  - id: nl-07
    text: "List all microgrid sites."
    category: filter-enum
    ceiling: false
    expected_object_type: Site
    expected_operation: list
    expected_filters:
      - {property: site_type, op: eq, value: microgrid}
    expected_ids: [site-microgrid-01]
    expected_count: 1
    expected_grounded: true

  # --- ceiling: needs superlative / join / aggregate-beyond-count (5) --------
  # Scored on answer_ok (phrase-step rescue). The "true answer" is hand-derived
  # from the synthetic data; expected_answer_substrings are the load-bearing
  # facts that must appear in a correct phrased answer.
  - id: nl-08
    text: "What is the highest temperature reading, and on which battery?"
    category: superlative
    ceiling: true
    # No max/sort in StructuredQuery. A correct answer needs the phrase step to
    # pick the max over retrieved celsius readings. True: 96.5 C on Battery Bank A.
    expected_answer_substrings: ["96.5", "Battery Bank A"]
    expected_grounded: true

  - id: nl-09
    text: "How many events are recorded for Battery Bank A?"
    category: join-count
    ceiling: true
    # Cross-type join: name "Battery Bank A" -> asset_id -> events. True: 5
    # (event-transition-01, event-reading-01, event-reading-05, event-reading-06,
    # event-reading-03 all carry asset_id=asset-battery-01).
    expected_answer_substrings: ["5"]
    expected_grounded: true

  - id: nl-10
    text: "What is the average temperature across Battery Bank B's readings?"
    category: join-aggregate
    ceiling: true
    # Join + avg (no avg in StructuredQuery). Battery Bank B celsius readings:
    # 41.7, 39.0, 43.2 -> mean 41.3.
    expected_answer_substrings: ["41.3"]
    expected_grounded: true

  - id: nl-11
    text: "Which battery is running the hottest right now?"
    category: entity-superlative
    ceiling: true
    # Join + max-by-entity. Battery Bank A peaks at 96.5 C vs Battery Bank B's
    # 43.2 C -> Battery Bank A.
    expected_answer_substrings: ["Battery Bank A"]
    expected_grounded: true

  - id: nl-12
    text: "List all currently open alerts."
    category: honesty-no-data
    ceiling: true
    # Anti-hallucination probe: Alert is a valid ontology type but has NO backing
    # synthetic data -> execute returns [] -> the deterministic "no records"
    # answer, grounded=false. A correct system must NOT invent alerts.
    expected_object_type: Alert
    expected_grounded: false
    expected_count: 0
    expected_answer_substrings: ["No"]
