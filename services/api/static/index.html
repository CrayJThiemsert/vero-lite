<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <title>OCT · Operational Control Tower</title>
  <meta name="description" content="Operational Control Tower — an ontology-driven operations console: see your assets, understand a flagged anomaly, approve a governed action, and ask grounded questions of your own data." />
  <!-- Asset cache-busting: bump the ?v= token on ANY assets/* edit so a NORMAL
       browser reload picks up the change (no hard-refresh needed during review).
       Same-origin local query string — no CDN, offline-safe: the static server
       serves the file and ignores the query, so the cached ?v=<token> URL is
       reused offline with zero external request (AC-12). -->
  <link rel="stylesheet" href="assets/theme.css?v=c4" />
  <link rel="stylesheet" href="assets/views.css?v=c4" />
  <link rel="stylesheet" href="assets/story.css?v=c4" />
</head>
<body>
  <div id="app"></div>

  <!-- thumbnail used by the offline bundler (icon splash / no-JS fallback) -->
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#0d1119"/>
      <g fill="none" stroke="#4d8df0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <rect x="30" y="30" width="18" height="18" rx="3"/>
        <rect x="52" y="30" width="18" height="18" rx="3"/>
        <rect x="30" y="52" width="18" height="18" rx="3"/>
        <rect x="52" y="52" width="18" height="18" rx="3"/>
      </g>
      <circle cx="70" cy="30" r="6" fill="#46b377"/>
    </svg>
  </template>

  <!-- data + logic (order matters) — ?v= token shared with the CSS above -->
  <script src="assets/mock.js?v=c4"></script>
  <script src="assets/api.js?v=c4"></script>
  <script src="assets/components.js?v=c4"></script>
  <script src="assets/motion.js?v=c4"></script>
  <script src="assets/llm-control.js?v=c4"></script>
  <script src="assets/view-map.js?v=c4"></script>
  <script src="assets/view-anomaly.js?v=c4"></script>
  <script src="assets/view-ask.js?v=c4"></script>
  <script src="assets/view-flow.js?v=c4"></script>
  <script src="assets/intake-view.js?v=c4"></script>
  <script src="assets/view-story.js?v=c4"></script>
  <script src="assets/app.js?v=c4"></script>
</body>
</html>
